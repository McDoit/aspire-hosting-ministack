name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: McDoit.Aspire.Hosting.Ministack
          manifest-file: .release-please-manifest.json
          include-v-in-tag: true
